add_newline = false
command_timeout = 2000

# Define the order of prompt modules
format = """
$directory\
${custom.git_branch_trimmed}\
$git_state\
$git_metrics\
$git_status\
$nodejs\
$php
$character\
"""

# Custom directory styling from your snippet
[directory]
format = '[󰉖 $path]($style)[$read_only]($read_only_style) '
truncation_length = 1
style = 'bold white'
read_only = " 󰌾"
read_only_style = "red"

# Minimal input character on the second line
[character]
success_symbol = "[❯](#4a6984)"
error_symbol = "[❯](red)"

# Cuts characters 1 through 14 out completely, showing character 15 to the end
[custom.git_branch_trimmed]
command = "git branch --show-current 2>/dev/null | sed -E 's/^.{14}//'"
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
style = "bright-black"
format = "[ $output]($style)"

# Git State (Rebasing, Merging, etc.)
[git_state]
style = "yellow"
format = "([\\($state( $progress_current/$progress_total)\\)]($style))"

# Git Metrics (Added/Deleted lines)
[git_metrics]
added_style = "green"
deleted_style = "red"
format = "([+$added]($added_style) [-$deleted]($deleted_style))"
disabled = true

# Git Status (with counts)
[git_status]
conflicted = "=${count}"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "$${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"
style = "bright-cyan"
format = "([\\[$all_status$ahead_behind\\]]($style))"

# Node.js version
[nodejs]
# symbol = " "
style = "#3e6b5c"
format = " [$version]($style)"
detect_files = ["package.json", ".node-version", ".nvmrc"]
detect_folders = ["node_modules"]
detect_extensions = []

# PHP version
[php]
style = "#5b82b5"
format = " [$version]($style)"
detect_files = ["composer.json", ".php-version"]
detect_folders = ["vendor"]
detect_extensions = []
# disabled = true

# Local Time
[time]
disabled = true
time_format = "%H:%M:%S"
style = "bright-black"
format = " [at $time]($style)"
